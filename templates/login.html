<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RunbookGen AI</title>

    <style>
        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        h1 {
            font-size: 26px;
            margin-bottom: 6px;
            color: #0f172a;
        }

        p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 14px;
            font-weight: 600;
            font-size: 14px;
            color: #334155;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .links {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .links a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .divider {
            margin: 18px 0;
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
        }

        .secondary-btn {
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #334155;
            font-weight: 600;
            cursor: pointer;
        }

        .secondary-btn:hover {
            background: #e2e8f0;
        }

        .hint {
            margin-top: 14px;
            font-size: 13px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            color: #475569;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>RunbookGen AI</h1>
        <p>Sign in to continue</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
        </form>

        <div class="links">
            <a href="/forgot">Forgot password?</a>
            <a href="/signup">Create account</a>
        </div>

        <div class="divider">OR</div>

        <button class="secondary-btn" onclick="window.location.href='/signup'">
            Sign up
        </button>

        <div class="hint">
            Demo: <b>admin</b> / <b>admin123</b>
        </div>
    </div>
</body>
</html>
