<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Runbook - RunbookGen AI</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc, #eef2f7);
            color: #1e293b;
        }

        .wrapper {
            max-width: 1100px;
            margin: auto;
            padding: 30px 20px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .title-box h1 {
            margin: 0;
            font-size: 26px;
            color: #0f172a;
        }

        .title-box p {
            margin-top: 4px;
            font-size: 14px;
            color: #64748b;
        }

        .btn {
            border: none;
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn-light {
            background: #e2e8f0;
            color: #1e293b;
        }

        .btn-light:hover {
            background: #cbd5e1;
        }

        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 18px;
            margin-bottom: 18px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            background: #e0edff;
            color: #2563eb;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .query-box {
            background: #f1f5f9;
            border-left: 4px solid #2563eb;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .action-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        /* ✅ TRANSPARENT PROFESSIONAL BOX */
        .runbook-box {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(6px);
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px;

            max-height: 550px;
            overflow-y: auto;
        }

        .runbook-box pre {
            margin: 0;
            font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
            font-size: 14px;
            line-height: 1.8;
            color: #1e293b;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div class="wrapper">

        <!-- Top -->
        <div class="topbar">
            <div class="title-box">
                <h1>Generated Runbook</h1>
                <p>Structured troubleshooting output</p>
            </div>

            <div>
                <a href="/" class="btn btn-light">Back</a>
                <a href="/history" class="btn">History</a>
            </div>
        </div>

        <!-- Issue -->
        <div class="card">
            <div class="section-title">Submitted Issue</div>
            <div class="query-box">{{ query }}</div>
        </div>

        <!-- Runbook -->
        <div class="card">
            <div class="section-title">Runbook Output</div>

            {% if mode %}
                <div class="badge">{{ mode }}</div>
            {% endif %}

            <div class="action-row">
                <button onclick="copyRunbook()" class="btn">Copy</button>

                <form action="/export" method="POST">
                    <textarea name="content" hidden>{{ result }}</textarea>
                    <button type="submit" class="btn btn-light">Export</button>
                </form>
            </div>

            <!-- ✅ FIXED OUTPUT -->
            <div class="runbook-box">
                <pre id="runbookText">{{ result }}</pre>
            </div>
        </div>

    </div>

    <script>
        function copyRunbook() {
            const text = document.getElementById("runbookText").innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>
